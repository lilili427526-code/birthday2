<script>
        let currentPage = 1;
        const totalPages = 6; // 扩展到 6 页
        const bgMusic = document.getElementById('bgMusic');
        const videoOverlay = document.getElementById('videoOverlay');
        const menuVideo = document.getElementById('menuVideo');

        const bgImgList = [
            "1.jpg",
            "2.jpg",
            "3.jpg"
        ];
        let imgIndex = 0;

        // ----- Confetti animation for page 4 -----
        function createRandomCircle() {
            const page4 = document.getElementById('page4');
            const colors = ['#ff4081', '#4285F4', '#FFC107', '#4CAF50', '#9C27B0', '#FF5722', '#00BCD4', '#E91E63'];
            let interval = setInterval(() => {
                if (!document.getElementById('page4').classList.contains('active')) {
                    return;
                }
                const circle = document.createElement('div');
                circle.className = 'circle-dot';
                let size = Math.random() * 20 + 10;
                circle.style.width = size + 'px';
                circle.style.height = size + 'px';
                circle.style.left = Math.random() * 100 + '%';
                circle.style.top = Math.random() * 100 + '%';
                circle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                page4.appendChild(circle);
                setTimeout(() => circle.remove(), 2000);
            }, 300);
            page4._circleInterval = interval;
        }

        // ----- Page navigation -----
        function goToPage(pageNum) {
            if (pageNum > totalPages) return;

            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(`page${pageNum}`);
            target.classList.add('active');
            currentPage = pageNum;

            const animEls = target.querySelectorAll('.text-animate');
            animEls.forEach(el => {
                el.style.animation = 'none';
                void el.offsetHeight;
                el.style.animation = '';
            });

            if (pageNum === 4) {
                if (document.getElementById('page4')._circleInterval) {
                    clearInterval(document.getElementById('page4')._circleInterval);
                }
                createRandomCircle();
            } else {
                if (document.getElementById('page4')._circleInterval) {
                    clearInterval(document.getElementById('page4')._circleInterval);
                }
            }

            if (pageNum === 5) {
                const p5 = document.getElementById('page5');
                if (!p5.style.backgroundImage || p5.style.backgroundImage === 'none') {
                    p5.style.backgroundImage = `url(${bgImgList[0]})`;
                }
            }
        }

        // ----- 菜单视频播放与 BGM 联动逻辑 -----
        function playMenuVideo(videoSrc) {
            bgMusic.pause();

            menuVideo.src = videoSrc;
            videoOverlay.style.display = 'flex';
            menuVideo.play().catch(err => {
                console.log("视频播放失败，需要用户交互: ", err);
            });

            menuVideo.onended = function() {
                videoOverlay.style.display = 'none';
                menuVideo.src = ""; 
                bgMusic.play().catch(() => {});
            };
        }

        // ----- Click to switch images on page 5 -----
        document.getElementById('page5').addEventListener('click', function (e) {
            // 如果点击的是文本框，则不切换第五页的背景图
            if (e.target.closest('.text-box')) return;
            imgIndex = (imgIndex + 1) % bgImgList.length;
            this.style.backgroundImage = `url(${bgImgList[imgIndex]})`;
        });

        // ===== 手机端向左划进入第六页的触摸逻辑 =====
        let touchStartX = 0;
        let touchEndX = 0;
        const page5Element = document.getElementById('page5');

        page5Element.addEventListener('touchstart', function(e) {
            // 记录手指按下时的 X 坐标
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        page5Element.addEventListener('touchend', function(e) {
            // 记录手指离开时的 X 坐标
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const swipeDistance = touchStartX - touchEndX;
            // 当向左滑动的距离大于 50 像素时，判定为有效的向左划动手势
            if (swipeDistance > 50) {
                goToPage(6);
            }
        }

        // ----- Music playback -----
        function playMusic() {
            bgMusic.play().catch(e => {
                console.log("Audio play requires user interaction");
            });
        }

        document.addEventListener('click', function () {
            if (bgMusic.paused && videoOverlay.style.display !== 'flex') {
                bgMusic.play().catch(() => { });
            }
        }, { once: false });

        // ----- Preload first image -----
        const preloadImg = new Image();
        preloadImg.src = bgImgList[0];
        preloadImg.onload = function () {
            if (document.getElementById('page5').classList.contains('active')) {
                document.getElementById('page5').style.backgroundImage = `url(${bgImgList[0]})`;
            }
        };

        window.addEventListener('load', function () {
            if (document.getElementById('page5').classList.contains('active')) {
                document.getElementById('page5').style.backgroundImage = `url(${bgImgList[0]})`;
            }
        });

        console.log('🎂 Happy Birthday! Hope you like this little surprise~');
    </script>
